<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game Bida Matter.js - Độ phân giải cao (1604x891)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #0a0a0a; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        canvas { 
            box-shadow: 0 20px 80px rgba(0,0,0,0.9); 
            border-radius: 20px;
            /* Đảm bảo canvas tự động thu nhỏ lại vừa màn hình nếu bạn mở trên màn hình nhỏ hơn 1604px */
            max-width: 98vw;
            max-height: 98vh;
            object-fit: contain;
        }
    </style>
</head>
<body>

<script>
    const Engine = Matter.Engine,
          Render = Matter.Render,
          Runner = Matter.Runner,
          Bodies = Matter.Bodies,
          Composite = Matter.Composite,
          Mouse = Matter.Mouse,
          MouseConstraint = Matter.MouseConstraint;

    const engine = Engine.create();
    engine.gravity.y = 0; 

    // --- KÍCH THƯỚC CHUẨN MỚI ---
    const WIDTH = 1604;
    const HEIGHT = 891;

    const render = Render.create({
        element: document.body,
        engine: engine,
        options: {
            width: WIDTH,
            height: HEIGHT,
            wireframes: false, 
            background: 'transparent'
        }
    });

    // --- ĐIỀU CHỈNH TỶ LỆ VẬT LÝ ---
    // Phóng to kích thước bàn kéo theo băng cũng dày hơn để bi đập đúng vạch nỉ
    const wallThick = 114; 
    const wallOptions = { 
        isStatic: true, 
        restitution: 0.85, // Độ nảy của băng duy trì ở mức khá tốt
        friction: 0.1,
        render: { visible: false } 
    };

    const topWall = Bodies.rectangle(WIDTH/2, wallThick/2, WIDTH, wallThick, wallOptions);
    const bottomWall = Bodies.rectangle(WIDTH/2, HEIGHT - wallThick/2, WIDTH, wallThick, wallOptions);
    const leftWall = Bodies.rectangle(wallThick/2, HEIGHT/2, wallThick, HEIGHT, wallOptions);
    const rightWall = Bodies.rectangle(WIDTH - wallThick/2, HEIGHT/2, wallThick, HEIGHT, wallOptions);

    // Bán kính viên bi được tăng lên mức 24px để cân xứng với chiếc bàn khổng lồ
    const cueBall = Bodies.circle(WIDTH * 0.75, HEIGHT / 2, 24, {
        restitution: 0.9, 
        friction: 0.005,  
        frictionAir: 0.01, // Giảm một chút xíu nữa để bi lăn tự nhiên trên quãng đường dài
        render: { 
            fillStyle: '#ffffff',
            sprite: { xScale: 1, yScale: 1 } 
        }
    });

    Composite.add(engine.world, [topWall, bottomWall, leftWall, rightWall, cueBall]);

    const canvas = render.canvas;
    const ctx = canvas.getContext('2d');
    const tableImg = new Image();
    tableImg.src = 'table.png'; 

    (function renderLoop() {
        window.requestAnimationFrame(renderLoop);
        if (tableImg.complete) {
            ctx.globalCompositeOperation = 'destination-over';
            ctx.drawImage(tableImg, 0, 0, WIDTH, HEIGHT);
            ctx.globalCompositeOperation = 'source-over';
        }
    })();

    const mouse = Mouse.create(render.canvas);
    const mouseConstraint = MouseConstraint.create(engine, {
        mouse: mouse,
        constraint: { stiffness: 0.2, render: { visible: false } }
    });
    Composite.add(engine.world, mouseConstraint);

    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);

</script>
</body>
</html>
