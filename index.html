<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game Bida - Khắc Phục Lỗi Hiển Thị</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #111; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        /* Khung chứa game cố định tỷ lệ */
        #game-container {
            position: relative;
            width: 1604px;
            height: 891px;
            max-width: 98vw;
            max-height: 98vh;
            aspect-ratio: 1604 / 891;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            
            /* MÀU TÍM DỰ PHÒNG: Nếu ảnh lỗi, hộp này sẽ có màu tím */
            background-color: #8A1C9A; 
            
            /* LINK ẢNH IMGBB CỦA BẠN */
            background-image: url('https://i.ibb.co/MwHF9qv/H-nh-nh-PNG.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Lớp vật lý đè lên trên */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border-radius: 20px;
            pointer-events: auto; /* Cho phép click chuột */
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

<script>
    const Engine = Matter.Engine,
          Render = Matter.Render,
          Runner = Matter.Runner,
          Bodies = Matter.Bodies,
          Composite = Matter.Composite,
          Mouse = Matter.Mouse,
          MouseConstraint = Matter.MouseConstraint;

    const engine = Engine.create();
    engine.gravity.y = 0; 

    // Gắn Render vào trong cái hộp #game-container thay vì thẻ body
    const render = Render.create({
        element: document.getElementById('game-container'),
        engine: engine,
        options: {
            width: 1604,
            height: 891,
            wireframes: false, 
            background: 'transparent' // Bắt buộc trong suốt để lộ ảnh bên dưới
        }
    });

    const wallThick = 114; 
    const wallOptions = { 
        isStatic: true, 
        restitution: 0.85, 
        friction: 0.1,
        render: { visible: false } 
    };

    const topWall = Bodies.rectangle(1604/2, wallThick/2, 1604, wallThick, wallOptions);
    const bottomWall = Bodies.rectangle(1604/2, 891 - wallThick/2, 1604, wallThick, wallOptions);
    const leftWall = Bodies.rectangle(wallThick/2, 891/2, wallThick, 891, wallOptions);
    const rightWall = Bodies.rectangle(1604 - wallThick/2, 891/2, wallThick, 891, wallOptions);

    const cueBall = Bodies.circle(1604 * 0.75, 891 / 2, 24, {
        restitution: 0.9, 
        friction: 0.005,  
        frictionAir: 0.01, 
        render: { 
            fillStyle: '#ffffff',
            strokeStyle: '#cccccc', 
            lineWidth: 2
        }
    });

    Composite.add(engine.world, [topWall, bottomWall, leftWall, rightWall, cueBall]);

    const mouse = Mouse.create(render.canvas);
    const mouseConstraint = MouseConstraint.create(engine, {
        mouse: mouse,
        constraint: { stiffness: 0.2, render: { visible: false } }
    });
    Composite.add(engine.world, mouseConstraint);

    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);

</script>
</body>
</html>
