<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game Bida - Chế độ Màn hình ngang</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #0a0a0a; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        
        /* Ép buộc hiển thị nằm ngang (landscape) cho trải nghiệm vật lý tốt nhất */
        @media screen and (orientation: portrait) {
            body::before {
                content: "Vui lòng xoay ngang thiết bị để hiển thị bàn bi-a!";
                color: #ff66ff;
                font-size: 24px;
                font-weight: bold;
                font-family: sans-serif;
                text-align: center;
                padding: 20px;
                position: absolute;
                z-index: 100;
            }
            canvas { display: none !important; }
        }

        canvas { 
            box-shadow: 0 20px 80px rgba(0,0,0,0.9); 
            border-radius: 20px;
            max-width: 98vw;
            max-height: 98vh;
            
            /* GỌI TRỰC TIẾP FILE ẢNH TRONG MÁY */
            background-image: url('table.png'); /* Đổi thành table.jpg nếu ảnh của bạn là jpg */
            background-size: 100% 100%; 
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>

<script>
    const Engine = Matter.Engine,
          Render = Matter.Render,
          Runner = Matter.Runner,
          Bodies = Matter.Bodies,
          Composite = Matter.Composite,
          Mouse = Matter.Mouse,
          MouseConstraint = Matter.MouseConstraint;

    const engine = Engine.create();
    engine.gravity.y = 0; 

    const WIDTH = 1604;
    const HEIGHT = 891;

    const render = Render.create({
        element: document.body,
        engine: engine,
        options: {
            width: WIDTH,
            height: HEIGHT,
            wireframes: false, 
            background: 'transparent' 
        }
    });

    const wallThick = 114; 
    const wallOptions = { 
        isStatic: true, 
        restitution: 0.85, 
        friction: 0.1,
        render: { visible: false } 
    };

    const topWall = Bodies.rectangle(WIDTH/2, wallThick/2, WIDTH, wallThick, wallOptions);
    const bottomWall = Bodies.rectangle(WIDTH/2, HEIGHT - wallThick/2, WIDTH, wallThick, wallOptions);
    const leftWall = Bodies.rectangle(wallThick/2, HEIGHT/2, wallThick, HEIGHT, wallOptions);
    const rightWall = Bodies.rectangle(WIDTH - wallThick/2, HEIGHT/2, wallThick, HEIGHT, wallOptions);

    const cueBall = Bodies.circle(WIDTH * 0.75, HEIGHT / 2, 24, {
        restitution: 0.9, 
        friction: 0.005,  
        frictionAir: 0.01, 
        render: { 
            fillStyle: '#ffffff',
            strokeStyle: '#cccccc', 
            lineWidth: 2
        }
    });

    Composite.add(engine.world, [topWall, bottomWall, leftWall, rightWall, cueBall]);

    const mouse = Mouse.create(render.canvas);
    const mouseConstraint = MouseConstraint.create(engine, {
        mouse: mouse,
        constraint: { stiffness: 0.2, render: { visible: false } }
    });
    Composite.add(engine.world, mouseConstraint);

    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);

</script>
</body>
</html>
